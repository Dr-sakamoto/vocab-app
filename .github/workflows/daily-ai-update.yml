name: Daily AI Update

on:
  schedule:
    # 毎朝 9:00 JST (= UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  ai-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code autonomous update
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            あなたはこのvocab-app（ポケモン風単語学習アプリ）の自律改善エージェントです。

            ## 今日のミッション
            以下の4観点でアプリを分析し、改善を実装してください。

            ### 1. UI/UX レビュー
            - コンポーネント（app/components/）のユーザビリティを確認
            - モバイル対応・アクセシビリティの問題を検出
            - アニメーション・インタラクションの改善余地を探す

            ### 2. ファイル構成レビュー
            - lib/ と app/ の責務分離が適切か確認
            - 重複コード・未使用ファイルを検出
            - 命名規則の一貫性を確認

            ### 3. セキュリティレビュー
            - API エンドポイント（app/api/）の入力バリデーション確認
            - Supabase クエリのインジェクションリスク確認
            - クライアントに秘密情報が漏れていないか確認

            ### 4. 収益可能性レビュー
            - ユーザーのエンゲージメントを高める機能の余地
            - プレミアム機能として切り出せる要素
            - ユーザー継続率を上げるゲームループの改善

            ## 実装ルール（必ず守ること）
            - CLAUDE.md のコンセプトを最優先で尊重する
            - 1日1PR、スコープを絞って小さく確実に実装する
            - 破壊的変更は行わない（既存テストを壊さない）
            - tests/ のテストがすべてパスすることを確認してから PR を作成する
            - PR タイトルは「[AI Daily] YYYY-MM-DD: <改善内容>」形式にする
            - PR本文に「分析サマリー」と「実装内容」と「テスト確認」を記載する

            まず4観点で分析し、最もインパクトが高く安全な1件を選んで実装してください。

      - name: Get created PR info
        id: pr-info
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 直近のオープンPRを取得
          PR_DATA=$(gh pr list --repo ${{ github.repository }} --state open --limit 1 --json number,title,url,body)
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.[0].number // "なし"')
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.[0].title // "PRは作成されませんでした"')
          PR_URL=$(echo "$PR_DATA" | jq -r '.[0].url // ""')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: r.naruo33@gmail.com
          from: vocab-app AI <${{ secrets.GMAIL_ADDRESS }}>
          subject: "🤖 [vocab-app] 今日のAI改善レポート"
          html_body: |
            <div style="font-family: sans-serif; max-width: 600px; margin: 0 auto;">
              <h2 style="color: #e53e3e;">🎮 vocab-app 自律AIレポート</h2>
              <p>今朝のAI改善セッションが完了しました。</p>

              <div style="background: #f7fafc; border-left: 4px solid #4299e1; padding: 16px; margin: 16px 0;">
                <strong>PR タイトル:</strong><br>
                ${{ steps.pr-info.outputs.pr_title }}
              </div>

              ${{ steps.pr-info.outputs.pr_url != '' && format('<p><a href="{0}" style="display: inline-block; background: #48bb78; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold;">✅ PRを確認してマージする</a></p>', steps.pr-info.outputs.pr_url) || '<p style="color: #718096;">今日は改善対象が見つからなかったため、PRは作成されませんでした。</p>' }}

              <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 24px 0;">
              <p style="color: #718096; font-size: 12px;">
                このメールは vocab-app の GitHub Actions から自動送信されています。<br>
                リポジトリ: github.com/Dr-sakamoto/vocab-app
              </p>
            </div>
