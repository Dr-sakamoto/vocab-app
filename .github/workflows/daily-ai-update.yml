name: Daily AI Update

on:
  schedule:
    # 毎朝 5:00 JST (= UTC 20:00)
    - cron: '0 20 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  ai-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code autonomous update
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            あなたはこのリポジトリ（${{ github.repository }}）の自律改善エージェントです。
            プロジェクトのコンセプトや制約は CLAUDE.md に定義されています。必ず最初に読んでください。

            ## 今日のミッション
            以下の4観点でアプリを分析し、改善を実装してください。

            ### 1. UI/UX レビュー
            - コンポーネントのユーザビリティを確認
            - モバイル対応・アクセシビリティの問題を検出
            - アニメーション・インタラクションの改善余地を探す

            ### 2. ファイル構成レビュー
            - ディレクトリ間の責務分離が適切か確認
            - 重複コード・未使用ファイルを検出
            - 命名規則の一貫性を確認

            ### 3. セキュリティレビュー
            - API エンドポイントの入力バリデーション確認
            - 外部サービス連携のインジェクションリスク確認
            - クライアントに秘密情報が漏れていないか確認

            ### 4. 収益可能性レビュー
            - ユーザーのエンゲージメントを高める機能の余地
            - プレミアム機能として切り出せる要素
            - ユーザー継続率を上げるループの改善

            ## 実装ルール（必ず守ること）
            - CLAUDE.md のコンセプトを最優先で尊重する
            - 1日1PR、スコープを絞って小さく確実に実装する
            - 破壊的変更は行わない（既存テストを壊さない）
            - tests/ のテストがすべてパスすることを確認してから PR を作成する
            - PR タイトルは「[AI Daily] YYYY-MM-DD: <改善内容>」形式にする
            - PR本文に「分析サマリー」と「実装内容」と「テスト確認」を記載する

            まず4観点で分析し、最もインパクトが高く安全な1件を選んで実装してください。

      - name: Get created PR info
        id: pr-info
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh pr list --repo ${{ github.repository }} --state open --limit 1 --json number,title,url)
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.[0].number // "なし"')
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.[0].title // "PRは作成されませんでした"')
          PR_URL=$(echo "$PR_DATA" | jq -r '.[0].url // ""')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: r.naruo33@gmail.com
          from: ${{ github.event.repository.name }} AI <${{ secrets.GMAIL_ADDRESS }}>
          subject: "🤖 [${{ github.event.repository.name }}] 今日のAI改善レポート（8:00に自動マージ）"
          html_body: |
            <div style="font-family: sans-serif; max-width: 600px; margin: 0 auto;">
              <div style="background: #805ad5; color: white; padding: 12px 20px; border-radius: 8px 8px 0 0;">
                <strong>🤖 ${{ github.event.repository.name }}</strong>
                <span style="float: right; font-size: 13px; opacity: 0.8;">自律AIレポート</span>
              </div>

              <div style="border: 1px solid #e2e8f0; border-top: none; padding: 20px; border-radius: 0 0 8px 8px;">
                <div style="background: #fff8e1; border-left: 4px solid #f6ad55; padding: 14px; margin-bottom: 16px; border-radius: 4px;">
                  ⏰ <strong>何もしなければ 8:00 に自動マージされます</strong><br>
                  <span style="color: #718096; font-size: 13px;">気に入らない場合は「却下する」を押してください</span>
                </div>

                <div style="background: #f7fafc; border-left: 4px solid #4299e1; padding: 14px; margin-bottom: 20px; border-radius: 4px;">
                  <strong>今日の改善:</strong><br>
                  ${{ steps.pr-info.outputs.pr_title }}
                </div>

                <table style="width: 100%; border-collapse: separate; border-spacing: 8px;">
                  <tr>
                    <td style="width: 50%;">
                      <a href="${{ steps.pr-info.outputs.pr_url }}"
                         style="display: block; text-align: center; background: #48bb78; color: white; padding: 14px; border-radius: 6px; text-decoration: none; font-weight: bold;">
                        📋 内容を確認する
                      </a>
                    </td>
                    <td style="width: 50%;">
                      <a href="${{ steps.pr-info.outputs.pr_url }}"
                         style="display: block; text-align: center; background: #fc8181; color: white; padding: 14px; border-radius: 6px; text-decoration: none; font-weight: bold;">
                        🚫 却下する
                      </a>
                    </td>
                  </tr>
                </table>

                <p style="color: #a0aec0; font-size: 12px; margin-top: 20px;">
                  ※「却下する」→ GitHub PR ページで「Close pull request」を押すとマージされません。<br>
                  リポジトリ: github.com/${{ github.repository }}
                </p>
              </div>
            </div>
